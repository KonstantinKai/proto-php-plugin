name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'releases.json'
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'releases.json'
      - 'scripts/**'

jobs:
  build:
    name: Build & Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install proto
        run: bash <(curl -fsSL https://moonrepo.dev/install/proto.sh) --yes

      - name: Add proto to PATH
        run: echo "$HOME/.proto/bin" >> "$GITHUB_PATH"

      - name: Build WASM plugin
        run: cargo build --target wasm32-wasip1

      - name: Run tests
        run: cargo test

  e2e:
    name: E2E (${{ matrix.os }})
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build WASM plugin
        run: cargo build --target wasm32-wasip1

      - name: Install proto
        run: bash <(curl -fsSL https://moonrepo.dev/install/proto.sh) --yes

      - name: Add proto to PATH
        run: echo "$HOME/.proto/bin" >> "$GITHUB_PATH"

      - name: Register plugin and install PHP
        run: |
          proto plugin add php "file://./target/wasm32-wasip1/debug/php_tool.wasm"
          proto install php 8.4

      - name: Verify PHP
        run: proto run php -- --version

