name: Update Releases Index

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    name: Probe and update releases.json
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Probe static-php-cli releases
        run: bash scripts/probe-releases.sh releases.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases.json
          if git diff --cached --quiet; then
            echo "No changes to releases.json"
          else
            git commit -m "chore: update releases index"
            git push
          fi
